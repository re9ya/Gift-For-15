<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift For A Mentor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="scene-muffin" class="scene">
        <img id="muffin-img" src="assets/imgs/blueberry-muffin.png" alt="blueberry-muffin">
        <p>Do you like blueberry muffins?</p>
        <button id="yes-btn">Yes</button>
        <button id="no-btn">No</button>
    </div>

    <div id="scene-cake" class="scene" style="display:none">
        <img id="cake-img" src="assets/imgs/blueberry-cake.png" alt="fruit-cake">
        <p>Here's your cake! Hope you like fruit (without the blueberries)</p>

        <p>If not, then it's YOUR fault today!

        just kidding, I hope you like it!</p>

        <p>Time to blow out the candles! Click on each candle flame to blow it out</p>
    </div>

    <div id="scene-slideshow" class ="scene" style="display:none">
    </div>

    <div id="scene-letters" class ="scene" style="display:none">
    </div>

    <script src="script.js"></script>

</body>
</html>
